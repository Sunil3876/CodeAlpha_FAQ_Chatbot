<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ ChatBot API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 450px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header {
            background-color: #007acc;
            /* VS Code Blue theme */
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #chat-history {
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .user-message {
            background-color: #007acc;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .bot-message {
            background-color: #e2e8f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        #input-container {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #dee2e6;
        }

        #user-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            outline: none;
            font-size: 0.95rem;
        }

        #user-input:focus {
            border-color: #007acc;
        }

        #send-btn {
            padding: 10px 20px;
            border: none;
            background: #007acc;
            color: white;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #005f9e;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <div id="chat-header">FAQ AI Support</div>
        <div id="chat-history">
            <div class="message bot-message">Hello! Ask any question regarding the FAQs.</div>
        </div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            // Display user message
            appendMessage(message, 'user-message');
            inputField.value = '';

            try {
                // Call the FastAPI backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Display bot response
                if (response.ok) {
                    appendMessage(data.response, 'bot-message');
                } else {
                    appendMessage("Error: " + (data.detail || "Unknown error"), 'bot-message');
                }
            } catch (error) {
                appendMessage("Connection error. Ensure the backend server is running.", 'bot-message');
            }
        }

        function appendMessage(text, className) {
            const chatHistory = document.getElementById('chat-history');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + className;
            msgDiv.textContent = text;
            chatHistory.appendChild(msgDiv);

            // Auto-scroll to the bottom
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>

</body>

</html>
